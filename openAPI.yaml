openapi: 3.0.0
info:
  title: Book Management API
  description: A simple API to manage a collection of books, for SOA courses demo.
  version: 1.0.0
servers:
  - url: http://127.0.0.1:5000
    description: Development server
  - url: https://demoproductionserver.vercel.app/
    description: Production server
  
paths:
  /api/books:
    get:
      summary: Get all books
      operationId: get_books
      responses:
        '200':
          description: A list of books
          content:
            application/json:
              schema:
                type: array
                items:

                  $ref: '#/components/schemas/Book'

    post:
      summary: Add a new book
      operationId: add_book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBook'
      responses:
        '201':
          description: Book created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          description: Missing title or author

  /api/books/{book_id}:
    get:
      summary: Get a book by its ID
      operationId: get_book_by_id
      parameters:
        - name: book_id
          in: path
          required: true
          description: ID of the book to retrieve
          schema:
            type: integer
      responses:
        '200':
          description: The requested book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Book not found
    put:
      summary: Update an existing book
      operationId: update_book
      parameters:
        - name: book_id
          in: path
          required: true
          description: ID of the book to update
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBook'
      responses:
        '200':
          description: Book updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          description: Missing title or author
        '404':
          description: Book not found
    delete:
      summary: Delete a book
      operationId: delete_book
      parameters:
        - name: book_id
          in: path
          required: true
          description: ID of the book to delete
          schema:
            type: integer
      responses:
        '204':
          description: Book deleted successfully
        '404':
          description: Book not found
components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
          description: The unique identifier of the book.
        title:
          type: string
          description: The title of the book.
        author:
          type: string
          description: The author of the book.
    Pdf:

    NewBook:
      type: object
      properties:
        title:
          type: string
          description: The title of the book.
        author:
          type: string
          description: The author of the book.
      required:
        - title
        - author
